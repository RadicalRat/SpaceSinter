based_on_package: sinter_robot_mock
objectives:
  objective_library_paths:
    example_objective:
      package_name: "sinter_robot_hw"
      relative_path: "objectives"

hardware:
  simulated: false
  robot_driver_persist_launch_file:
    package: "sinter_robot_hw"
    path: "launch/additional_driver_nodes.launch.py"
  robot_description:
    urdf:
      package: "sinter_robot_hw"
      path: "urdf/j2n6s300.urdf.xacro"
    urdf_params:
        # Use "mock", "mujoco", or "physical"
      - hardware_interface: "physical"

ros2_control:
  # Hardware-specific controllers config: reduces update_rate from 500 Hz (mock)
  # to 100 Hz so the Kinova USB read/write calls (3x synchronous reads + 1 write
  # per cycle) don't starve DDS threads under SCHED_FIFO and cause switch timeouts.
  config:
    package: "sinter_robot_hw"
    path: "config/control/ros2_controllers.yaml"

  # Physical hardware only exposes velocity command interfaces.
  # joint_trajectory_admittance_controller requires position command interfaces
  # and is kept inactive.  velocity_force_controller is the target for poseIK /
  # pose_jog (see pose_jog.yaml).  joint_velocity_controller handles joint-space
  # velocity objectives and servo.
  controllers_active_at_startup:
    - "joint_state_broadcaster"
    - "joint_trajectory_admittance_controller"
  controllers_inactive_at_startup:
    - "velocity_force_controller"
    - "joint_velocity_controller"



