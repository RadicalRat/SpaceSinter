based_on_package: sinter_robot_mock
objectives:
  objective_library_paths:
    example_objective:
      package_name: "sinter_robot_hw"
      relative_path: "objectives"

hardware:
  simulated: false
  robot_driver_persist_launch_file:
    package: "sinter_robot_hw"
    path: "launch/additional_driver_nodes.launch.py"
  robot_description:
    urdf:
      package: "sinter_robot_hw"
      path: "urdf/j2n6s300.urdf.xacro"
    urdf_params:
        # Use "mock", "mujoco", or "physical"
      - hardware_interface: "physical"

ros2_control:
  # Hardware-specific controllers config: 100 Hz update rate.  USB I/O runs on a
  # background thread so the control loop never blocks on USB.
  config:
    package: "sinter_robot_hw"
    path: "config/control/ros2_controllers.yaml"

  # Hardware exposes both position and velocity command interfaces.
  # JTAC (position) is active by default; VFC/JVC are available on switch.
  controllers_active_at_startup:
    - "joint_state_broadcaster"
    - "joint_trajectory_admittance_controller"
  controllers_inactive_at_startup:
    - "velocity_force_controller"
    - "joint_velocity_controller"



