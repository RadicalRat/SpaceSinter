controller_manager:
  ros__parameters:
    update_rate: 50 # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - j2n6s300_joint_1
      - j2n6s300_joint_2
      - j2n6s300_joint_3
      - j2n6s300_joint_4
      - j2n6s300_joint_5
      - j2n6s300_joint_6
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: false # Set to false to suppress deprecation warning
    # Enable shortest-path angular error for continuous joints (1,4,5,6) so
    # that ±π crossings never cause spurious path-tolerance aborts.
    angle_wraparound: true
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0
      j2n6s300_joint_1:
        goal: 0.05
        trajectory: 0.25
      j2n6s300_joint_2:
        goal: 0.05
        trajectory: 0.25
      j2n6s300_joint_3:
        goal: 0.05
        trajectory: 0.25
      j2n6s300_joint_4:
        goal: 0.05
        trajectory: 0.25
      j2n6s300_joint_5:
        goal: 0.05
        trajectory: 0.25
      j2n6s300_joint_6:
        goal: 0.05
        trajectory: 0.25
