controller_manager:
  ros__parameters:
    update_rate: 500 # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    allow_nonzero_velocity_at_trajectory_end: false # Set to false to suppress deprecation warning
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0
      joint_1:
        goal: 0.05
        trajectory: 0.25
      joint_2:
        goal: 0.05
        trajectory: 0.25
      joint_3:
        goal: 0.05
        trajectory: 0.25
      joint_4:
        goal: 0.05
        trajectory: 0.25
      joint_5:
        goal: 0.05
        trajectory: 0.25
      joint_6:
        goal: 0.05
        trajectory: 0.25
